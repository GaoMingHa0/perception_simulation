assumptions:
- 圆心距离、内外圆直径、每圈内侧16个和外侧13个锥桶、锥桶尺寸/颜色/反光带来自用户提供的图。
- 内圈16个锥桶按整圆等角度布置；左圆从切点逆时针编号，右圆从切点顺时针编号。
- 外圈13个锥桶按两外圆交点之间的可见大圆弧等弧长布置，并在两端各内缩半个间隔，避免交点重叠。
- 换向高锥桶采用(x=±1.5 m, y=±1.5 m)；入口/出口减速锥桶采用(x=±1.5 m, y=±12.0 m)。这两项需要现场复测后更新。
- 入口/出口走廊长度取y∈[-13,13] m，停止区取y∈[10.625,13] m；原图未给出纵向尺寸。
