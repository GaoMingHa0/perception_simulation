# ==============================================================================
#  WUTA-FSD 仿真器 — Figure-8 8字绕环赛道定义
#  规则：两圆心距18.25m，内圈直径15.25m，外圈直径21.25m，赛道宽3m
#  蓝色锥筒 = 蓝色行径锥桶（左圆外圈 + 右圆内圈，赛道左边界）
#  黄色锥筒 = 红色行径锥桶（右圆外圈 + 左圆内圈，赛道右边界）+ 减速锥桶 + 换向锥桶
#  橙色锥筒 = 起止线标识
# ==============================================================================
track:
  type: figure8
  start_pose:
    x: 0.0
    y: 0.0
    yaw: 0.0

  # ====== 蓝色行径锥桶（赛道左边界），右圆内圈15个 + 左圆外圈13个 =================
  #  注：已移除y=±1.5平行切线之间3m区域内的锥桶（右圆内圈±2.605,0.453）
  blue_cones:
    # --- 右圆内圈（圆心 x=0, y=9.125，半径7.625m，共15个，顺时针左边界）---
    - [0.000,  16.750, 0.0]
    - [2.753,  16.245, 0.0]
    - [-2.753, 16.245, 0.0]
    - [5.141,  14.754, 0.0]
    - [-5.141, 14.754, 0.0]
    - [6.888,  12.388, 0.0]
    - [-6.888, 12.388, 0.0]
    - [7.796,  9.511,  0.0]
    - [-7.796, 9.511,  0.0]
    - [7.730,  6.579,  0.0]
    - [-7.730, 6.579,  0.0]
    - [6.742,  3.902,  0.0]
    - [-6.742, 3.902,  0.0]
    - [4.937,  1.799,  0.0]
    - [-4.937, 1.799,  0.0]

    # --- 左圆外圈（圆心 x=0, y=-9.125，半径10.625m，共13个，逆时针左边界）---
    - [0.000,  -19.750, 0.0]
    - [4.971,  -18.536, 0.0]
    - [-4.971, -18.536, 0.0]
    - [8.943,  -15.445, 0.0]
    - [-8.943, -15.445, 0.0]
    - [11.157, -11.056, 0.0]
    - [-11.157,-11.056, 0.0]
    - [11.157, -7.194,  0.0]
    - [-11.157,-7.194,  0.0]
    - [8.943,  -2.805,  0.0]
    - [-8.943, -2.805,  0.0]
    - [4.971,  0.286,   0.0]
    - [-4.971, 0.286,   0.0]

  # ====== 黄色锥桶合集：红色行径锥桶（赛道右边界）+ 减速锥桶 + 换向锥桶 ============
  yellow_cones:
    # --- 右圆外圈（红色行径，圆心 x=0, y=9.125，半径10.625m，共11个，顺时针右边界）---
    - [0.000,  19.750, 0.0]
    - [4.971,  18.536, 0.0]
    - [-4.971, 18.536, 0.0]
    - [8.943,  15.445, 0.0]
    - [-8.943, 15.445, 0.0]
    - [11.157, 11.056, 0.0]
    - [-11.157,11.056, 0.0]
    - [11.157, 7.194,  0.0]
    - [-11.157,7.194,  0.0]
    - [8.943,  2.805,  0.0]
    - [-8.943, 2.805,  0.0]

    # --- 左圆内圈（红色行径，圆心 x=0, y=-9.125，半径7.625m，共15个，逆时针右边界）---
    - [0.000,  -16.750, 0.0]
    - [2.753,  -16.245, 0.0]
    - [-2.753, -16.245, 0.0]
    - [5.141,  -14.754, 0.0]
    - [-5.141, -14.754, 0.0]
    - [6.888,  -12.388, 0.0]
    - [-6.888, -12.388, 0.0]
    - [7.796,  -9.511,  0.0]
    - [-7.796, -9.511,  0.0]
    - [7.730,  -6.579,  0.0]
    - [-7.730, -6.579,  0.0]
    - [6.742,  -3.902,  0.0]
    - [-6.742, -3.902,  0.0]
    - [4.937,  -1.799,  0.0]
    - [-4.937, -1.799,  0.0]

    # --- 换向锥桶（黄色三角，切点标识，共4个）---
    - [2.000,  1.500, 0.0]
    - [2.000, -1.500, 0.0]
    - [-2.000, 1.500, 0.0]
    - [-2.000,-1.500, 0.0]

    # --- 减速锥桶（黄色方块，进出口标识，共4个）---
    - [8.000,  1.500, 0.0]
    - [8.000, -1.500, 0.0]
    - [-8.000, 1.500, 0.0]
    - [-8.000,-1.500, 0.0]

  # ====== 起止线（橙色锥筒）===================================================
  orange_cones:
    - [0.0,  1.5, 0.0]
    - [0.0, -1.5, 0.0]