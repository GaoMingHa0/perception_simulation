# ==============================================================================
#  WUTA-FSD 仿真器 — Trackdrive 赛道定义
#  FSG 规则：蓝色锥筒 = 左侧边界，黄色锥筒 = 右侧边界，橙色 = 起止线
#  赛道宽度约 4m（蓝锥到黄锥间距），全长约 100m
# ==============================================================================

track:
  type: trackdrive
  start_pose:
    x: 0.0
    y: 0.0
    yaw: 0.0

  # ====== 左侧边界（蓝色锥筒）=================================================
  blue_cones:
    # -- 第一段直道 (x: 0 ~ 20m)，间距约 3m --
    - [0.0,  2.0, 0.0]
    - [3.0,  2.0, 0.0]
    - [6.0,  2.0, 0.0]
    - [9.0,  2.0, 0.0]
    - [12.0, 2.0, 0.0]
    - [15.0, 2.0, 0.0]
    - [18.0, 2.0, 0.0]
    - [20.0, 2.0, 0.0]

    # -- 第一个弯道（右转弯），外侧锥筒沿弧线，间距约 2m --
    - [22.5, 2.5, 0.0]
    - [24.5, 3.8, 0.0]
    - [26.0, 5.5, 0.0]
    - [27.0, 7.0, 0.0]
    - [27.8, 8.5, 0.0]
    - [28.0, 10.0, 0.0]
    - [27.8, 11.5, 0.0]
    - [27.0, 13.0, 0.0]
    - [25.5, 14.5, 0.0]

    # -- 第二段直道 (弯后回程)，间距约 3m --
    - [23.0, 14.5, 0.0]
    - [20.0, 14.5, 0.0]
    - [17.0, 14.5, 0.0]
    - [14.0, 14.5, 0.0]
    - [11.0, 14.5, 0.0]
    - [8.0,  14.5, 0.0]
    - [5.0,  14.5, 0.0]

    # -- 第二个弯道（左转弯），间距约 2m --
    - [2.5,  14.0, 0.0]
    - [0.5,  12.5, 0.0]
    - [-0.5, 11.0, 0.0]
    - [-0.8, 9.0,  0.0]
    - [-0.5, 7.5,  0.0]
    - [0.0,  6.0,  0.0]

    # -- 第三段直道（回到起点附近），间距约 3m --
    - [0.0,  3.0, 0.0]

  # ====== 右侧边界（黄色锥筒）=================================================
  yellow_cones:
    # -- 第一段直道 --
    - [0.0,  -2.0, 0.0]
    - [3.0,  -2.0, 0.0]
    - [6.0,  -2.0, 0.0]
    - [9.0,  -2.0, 0.0]
    - [12.0, -2.0, 0.0]
    - [15.0, -2.0, 0.0]
    - [18.0, -2.0, 0.0]
    - [20.0, -2.0, 0.0]

    # -- 第一个弯道（右转弯），内侧锥筒沿弧线 --
    - [22.5, -2.5, 0.0]
    - [24.5, -3.8, 0.0]
    - [26.0, -5.5, 0.0]
    - [27.0, -7.0, 0.0]
    - [27.8, -8.5, 0.0]
    - [28.0, -10.0, 0.0]
    - [27.8, -11.5, 0.0]
    - [27.0, -13.0, 0.0]
    - [25.5, -14.5, 0.0]

    # -- 第二段直道 --
    - [23.0, -14.5, 0.0]
    - [20.0, -14.5, 0.0]
    - [17.0, -14.5, 0.0]
    - [14.0, -14.5, 0.0]
    - [11.0, -14.5, 0.0]
    - [8.0,  -14.5, 0.0]
    - [5.0,  -14.5, 0.0]

    # -- 第二个弯道（左转弯）--
    - [2.5,  -14.0, 0.0]
    - [0.5,  -12.5, 0.0]
    - [-0.5, -11.0, 0.0]
    - [-0.8, -9.0,  0.0]
    - [-0.5, -7.5,  0.0]
    - [0.0,  -6.0,  0.0]

    # -- 第三段直道 --
    - [0.0,  -3.0, 0.0]

  # ====== 起止线（橙色锥筒）===================================================
  orange_cones:
    - [0.0,  2.0, 0.0]
    - [0.0, -2.0, 0.0]
