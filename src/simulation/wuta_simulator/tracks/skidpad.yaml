# ==============================================================================
#  WUTA-FSD 仿真器 — Skidpad 赛道定义
#  FSG 规则：两个圆，半径各 9.125m，圆心距 18.25m
#  先跑右圆 2 圈，再跑左圆 2 圈
#  所有锥筒用橙色标记（skidpad 不分蓝黄边界）
# ==============================================================================

track:
  type: skidpad
  start_pose:
    x: 0.0
    y: 0.0
    yaw: 0.0

  blue_cones: []
  yellow_cones: []

  # ====== 右圆（圆心在车辆右侧 9.125m 处）=====================================
  # 圆心坐标: (0, 9.125)，半径 9.125m
  # 18 个锥筒均匀分布（每 20° 一个）
  orange_cones:
    # 右圆 — 从起点（圆心正下方）开始，顺时针
    - [0.000,  0.000, 0.0]    #   0° 
    - [3.121,  0.545, 0.0]    #  20°
    - [5.727,  2.091, 0.0]    #  40°
    - [7.304,  4.184, 0.0]    #  60°
    - [7.950,  6.037, 0.0]    #  80°
    - [7.304,  8.066, 0.0]    # 100°
    - [5.727, 10.159, 0.0]    # 120°
    - [3.121, 11.705, 0.0]    # 140°
    - [0.000, 12.125, 0.0]    # 160°
    - [-3.121, 11.705, 0.0]   # 180°
    - [-5.727, 10.159, 0.0]   # 200°
    - [-7.304,  8.066, 0.0]   # 220°
    - [-7.950,  6.037, 0.0]   # 240°
    - [-7.304,  4.184, 0.0]   # 260°
    - [-5.727,  2.091, 0.0]   # 280°
    - [-3.121,  0.545, 0.0]   # 300°
    - [-0.001,  0.000, 0.0]   # 320°
    - [0.001,  0.000, 0.0]    # 340° 

    # 左圆 — 圆心 (0, -9.125)，半径 9.125m
    # 从上方（靠近右圆底部）开始，逆时针
    - [0.001, -18.250, 0.0]   #   0°
    - [3.121, -17.705, 0.0]   #  20°
    - [5.727, -16.159, 0.0]   #  40°
    - [7.304, -14.066, 0.0]   #  60°
    - [7.950, -12.213, 0.0]   #  80°
    - [7.304, -10.184, 0.0]   # 100°
    - [5.727,  -8.091, 0.0]   # 120°
    - [3.121,  -6.545, 0.0]   # 140°
    - [0.000,  -6.125, 0.0]   # 160°
    - [-3.121, -6.545, 0.0]   # 180°
    - [-5.727, -8.091, 0.0]   # 200°
    - [-7.304,-10.184, 0.0]   # 220°
    - [-7.950,-12.213, 0.0]   # 240°
    - [-7.304,-14.066, 0.0]   # 260°
    - [-5.727,-16.159, 0.0]   # 280°
    - [-3.121,-17.705, 0.0]   # 300°
    - [-0.001,-18.250, 0.0]   # 320°
    - [0.002, -18.250, 0.0]   # 340° 
